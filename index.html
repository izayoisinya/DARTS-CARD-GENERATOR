<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 ダーツ自己紹介カード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ヘッダー -->
<div class="app-header">
  <div class="dart-deco">🎯</div>
  <div class="logo">
    DARTS CARD GENERATOR
    <span>自己紹介カードメーカー</span>
  </div>
</div>

<!-- タブ -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('form')">✏️ 入力</button>
  <button class="tab-btn" onclick="switchTab('preview')">🃏 プレビュー</button>
</div>

<!-- ===== 入力画面 ===== -->
<div id="form-screen" class="screen active">

  <div class="section-label">基本情報</div>

  <!-- 写真＋名前・エリア -->
  <div class="photo-name-row">
    <div class="photo-upload" id="photo-upload" onclick="triggerPhoto()">
      <div class="upload-hint">
        <span class="upload-icon">📷</span>
        <span class="upload-text">写真を選択</span>
      </div>
    </div>
    <div class="fields-right">
      <div class="field">
        <label>カード名</label>
        <input type="text" id="f-name" placeholder="---" maxlength="20">
      </div>
      <div class="field">
        <label>エリア / ホーム</label>
        <input type="text" id="f-area" placeholder="---" maxlength="20">
      </div>
    </div>
  </div>
  <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="loadPhoto(event)">

  <div class="field">
    <label>レーティング</label>
    <div class="rating-row">
      <div class="rating-input-wrap">
        <span class="rating-badge live">LIVE</span>
        <input type="text" id="f-rating-live" placeholder="---" maxlength="6" inputmode="decimal" oninput="sanitizeRatingInput(this)">
      </div>
      <div class="rating-input-wrap">
        <span class="rating-badge phoenix">PHO</span>
        <input type="text" id="f-rating-phoenix" placeholder="---" maxlength="6" inputmode="decimal" oninput="sanitizeRatingInput(this)">
      </div>
    </div>
  </div>

  <div class="section-label">セッティング</div>

  <div class="field">
    <label>バレル</label>
    <input type="text" id="f-barrel" placeholder="---" maxlength="30">
  </div>

  <div class="field">
    <label>フライト / シャフト</label>
    <input type="text" id="f-flight" placeholder="---" maxlength="30">
  </div>

  <div class="field">
    <label>チップ</label>
    <input type="text" id="f-tip" placeholder="---" maxlength="20">
  </div>

  <div class="section-label">プレイスタイル</div>

  <div class="field">
    <label>普段のスタイル</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="style" data-val="solo" onclick="toggleSelect(this)">🤫 1人で黙々</button>
      <button class="toggle-btn" data-group="style" data-val="group" onclick="toggleSelect(this)">🎉 大人数でワイワイ</button>
    </div>
  </div>

  <div class="field">
    <label>飲酒</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="drink" data-val="yes" onclick="toggleSelect(this)">🍺 飲む</button>
      <button class="toggle-btn" data-group="drink" data-val="no" onclick="toggleSelect(this)">🚫 飲まない</button>
    </div>
  </div>

  <div class="field">
    <label>喫煙</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="smoke" data-val="yes" onclick="toggleSelect(this)">🚬 吸う</button>
      <button class="toggle-btn" data-group="smoke" data-val="no" onclick="toggleSelect(this)">🚭 吸わない</button>
    </div>
  </div>

  <div class="field">
    <label>ガチ度</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="gachi" data-val="gachi" onclick="toggleSelect(this)">🔥 ガチ</button>
      <button class="toggle-btn" data-group="gachi" data-val="half" onclick="toggleSelect(this)">⚖️ 半々</button>
      <button class="toggle-btn" data-group="gachi" data-val="enjoy" onclick="toggleSelect(this)">😄 エンジョイ</button>
    </div>
  </div>

  <div class="section-label">PR</div>

  <div class="field">
    <label>ひとことPR</label>
    <textarea id="f-pr" placeholder="---" maxlength="80"></textarea>
  </div>

  <button class="gen-btn" onclick="generateCard()">カードを生成する →</button>
</div>

<!-- ===== プレビュー画面 ===== -->
<div id="preview-screen" class="screen">

  <!-- 生成されるカード -->
  <div id="card-output">
    <!-- JS で描画 -->
  </div>

  <button class="save-btn" id="save-btn" onclick="saveCard()">
    <span>💾</span> PNG で保存する
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const state = {
  photo: null,    // base64 or null
  style: null,
  drink: null,
  smoke: null,
  gachi: null,
  generated: false,
};

// ===== TAB =====
function switchTab(tab) {
  if (tab === 'preview' && !state.generated) {
    showToast('先にカードを生成してください');
    return;
  }
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='form') || (i===1 && tab==='preview'));
  });
  document.getElementById('form-screen').classList.toggle('active', tab==='form');
  document.getElementById('preview-screen').classList.toggle('active', tab==='preview');
}

// ===== PHOTO =====
function triggerPhoto() {
  document.getElementById('photo-input').click();
}

function loadPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;

  const maxPhotoSize = 5 * 1024 * 1024;
  if (!file.type || !file.type.startsWith('image/')) {
    showToast('画像ファイルを選択してください');
    e.target.value = '';
    return;
  }
  if (file.size > maxPhotoSize) {
    showToast('画像サイズは5MB以下にしてください');
    e.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = ev => {
    state.photo = ev.target.result;
    const el = document.getElementById('photo-upload');
    el.classList.add('has-photo');
    el.innerHTML = `<img src="${state.photo}" alt="photo">`;
    syncPhotoSize();
  };
  reader.readAsDataURL(file);
}

function syncPhotoSize() {
  const right = document.querySelector('.photo-name-row .fields-right');
  const photo = document.getElementById('photo-upload');
  if (!right || !photo) return;
  const h = right.getBoundingClientRect().height;
  if (h > 0) {
    photo.style.width  = h + 'px';
    photo.style.height = h + 'px';
  }
}

// ページ読み込み後・リサイズ時にも同期
window.addEventListener('load', syncPhotoSize);
window.addEventListener('resize', syncPhotoSize);

function sanitizeRatingInput(input) {
  let value = input.value.replace(/[^0-9.]/g, '');
  const firstDot = value.indexOf('.');
  if (firstDot !== -1) {
    value = value.slice(0, firstDot + 1) + value.slice(firstDot + 1).replace(/\./g, '');
  }
  if (value.startsWith('.')) value = `0${value}`;
  input.value = value.slice(0, 6);
}

function updateSaveButtonState() {
  const btn = document.getElementById('save-btn');
  btn.disabled = !state.generated;
}

// ===== TOGGLE =====
function toggleSelect(btn) {
  const group = btn.dataset.group;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state[group] = btn.dataset.val;
}

// ===== GENERATE =====
function generateCard() {
  const name       = document.getElementById('f-name').value.trim() || 'NAME';
  const ratingLive = document.getElementById('f-rating-live').value.trim();
  const ratingPho  = document.getElementById('f-rating-phoenix').value.trim();
  const area       = document.getElementById('f-area').value.trim();
  const barrel     = document.getElementById('f-barrel').value.trim();
  const flight     = document.getElementById('f-flight').value.trim();
  const tip        = document.getElementById('f-tip').value.trim();
  const pr         = document.getElementById('f-pr').value.trim();

  const ratingBadges = (() => {
    const badges = [];
    if (ratingLive)  badges.push(`<span class="card-rating-badge" style="border-color:rgba(61,214,200,0.4);background:rgba(61,214,200,0.1)"><span class="card-rating-label" style="color:var(--teal)">LIVE</span><span class="card-rating-val" style="color:var(--teal)">${escHtml(ratingLive)}</span></span>`);
    if (ratingPho)   badges.push(`<span class="card-rating-badge" style="border-color:rgba(232,112,75,0.4);background:rgba(232,112,75,0.1)"><span class="card-rating-label" style="color:#e8704b">PHO</span><span class="card-rating-val" style="color:#e8704b">${escHtml(ratingPho)}</span></span>`);
    if (!badges.length) badges.push(`<span class="card-rating-badge"><span class="card-rating-label">RT</span><span class="card-rating-val">—</span></span>`);
    return badges.join('');
  })();

  const styleLabel = state.style === 'solo' ? ['1人で黙々','大人数でワイワイ'] : state.style === 'group' ? ['大人数でワイワイ','1人で黙々'] : [null, null];
  const drinkLabel = state.drink === 'yes' ? ['飲む','飲まない'] : state.drink === 'no' ? ['飲まない','飲む'] : [null, null];
  const smokeLabel = state.smoke === 'yes' ? ['吸う','吸わない'] : state.smoke === 'no' ? ['吸わない','吸う'] : [null, null];
  const gachiLabel = state.gachi === 'gachi' ? '🔥 ガチ' : state.gachi === 'half' ? '⚖️ 半々' : state.gachi === 'enjoy' ? '😄 エンジョイ' : null;

  const photoHTML = state.photo
    ? `<img src="${state.photo}" alt="photo">`
    : `<span style="font-size:28px">🎯</span>`;

  const prSection = pr ? `
    <div class="card-pr">
      <div class="c-label">PR</div>
      <div class="c-val">${escHtml(pr)}</div>
    </div>
  ` : '';

  // --- 入力済みセルだけ収集してグリッドに敷き詰める ---
  function cell(label, val, cls='') {
    return `<div class="card-cell">
      <div class="c-label">${label}</div>
      <div class="c-val${cls ? ' '+cls : ''}">${val}</div>
    </div>`;
  }
  function choiceCell(label, sel) {
    if (!sel) return null;
    return `<div class="card-cell">
      <div class="c-label">${label}</div>
      <div class="c-val">${sel}</div>
    </div>`;
  }

  // 全幅セル
  function wideCell(label, val, cls='') {
    return `<div class="card-cell">
      <div class="c-label">${label}</div>
      <div class="c-val${cls ? ' '+cls : ''}">${val}</div>
    </div>`;
  }

  // 1. エリア（全幅）
  const areaRow = area ? wideCell('エリア / ホーム', escHtml(area), 'gold') : '';

  // 2. セッティング（全幅）
  let settingRows = '';
  if (barrel) settingRows += wideCell('バレル', escHtml(barrel));
  if (flight) settingRows += wideCell('フライト / シャフト', escHtml(flight));
  if (tip)    settingRows += wideCell('チップ', escHtml(tip));

  // 3. 選択項目（2列グリッド）
  const choices = [];
  const styleCell = choiceCell('普段は', styleLabel[0]);
  if (styleCell) choices.push(styleCell);
  const drinkCell = choiceCell('飲酒', drinkLabel[0]);
  if (drinkCell) choices.push(drinkCell);
  const smokeCell = choiceCell('喫煙', smokeLabel[0]);
  if (smokeCell) choices.push(smokeCell);
  const gachiCell = choiceCell('ガチ度', gachiLabel);
  if (gachiCell) choices.push(gachiCell);

  let gridRows = '';
  for (let i = 0; i < choices.length; i += 2) {
    if (i + 1 < choices.length) {
      gridRows += `<div class="card-grid-2">${choices[i]}${choices[i+1]}</div>`;
    } else {
      gridRows += choices[i];
    }
  }

  document.getElementById('card-output').innerHTML = `
    <div class="card-header">
      <div class="card-photo">${photoHTML}</div>
      <div class="card-name-block">
        <div class="card-name">${escHtml(name)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
          ${ratingBadges}
        </div>
      </div>
    </div>
    <div class="card-body">
      ${areaRow}
      ${settingRows}
      ${gridRows}
      ${prSection}
    </div>
    <div class="card-footer">
      <span class="card-footer-tag">🎯 DARTS PROFILE CARD</span>
      <span class="card-footer-tag">${new Date().getFullYear()}</span>
    </div>
  `;

  state.generated = true;
  updateSaveButtonState();
  switchTab('preview');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== SAVE =====
async function saveCard() {
  if (!state.generated || !document.getElementById('card-output').children.length) {
    showToast('先にカードを生成してください');
    return;
  }

  const btn = document.getElementById('save-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<span>⏳</span> 生成中…';

  try {
    const el = document.getElementById('card-output');
    const canvas = await html2canvas(el, {
      backgroundColor: '#12141a',
      scale: 3,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });

    const link = document.createElement('a');
    link.download = `darts-card-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    showToast('✅ 保存しました！');
  } catch(e) {
    showToast('❌ 保存に失敗しました');
    console.error(e);
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<span>💾</span> PNG で保存する';
}

updateSaveButtonState();

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>

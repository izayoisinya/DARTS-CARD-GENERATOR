<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 ダーツ自己紹介カード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0b0e;
  --surface: #12141a;
  --surface2: #1a1d26;
  --border: #252833;
  --border-bright: #353a4d;
  --gold: #e8b84b;
  --gold-dim: rgba(232,184,75,0.15);
  --gold-glow: rgba(232,184,75,0.4);
  --teal: #3dd6c8;
  --teal-dim: rgba(61,214,200,0.12);
  --red: #ff4d6d;
  --text: #dde1ef;
  --muted: #6b7190;
  --font-display: 'Zen Dots', cursive;
  --font-body: 'Noto Sans JP', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
}

html, body {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.app-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-header .logo {
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.1em;
  line-height: 1.4;
}

.app-header .logo span {
  display: block;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.2em;
  font-family: var(--font-mono);
}

.dart-deco {
  font-size: 28px;
  line-height: 1;
}

/* ===== TAB NAV ===== */
.tab-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin: 18px 20px 0;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid var(--border);
}

.tab-btn {
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.tab-btn.active {
  background: var(--gold);
  color: #0a0b0e;
}

/* ===== FORM SCREEN ===== */
.screen { display: none; padding: 16px 20px 40px; }
.screen.active { display: block; }

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 22px 0 10px;
}

.section-label:first-of-type { margin-top: 8px; }

/* フィールド */
.field {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}

.field:focus-within {
  border-color: var(--gold);
  background: #14161e;
}

.field label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.14em;
  font-family: var(--font-mono);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.field input, .field textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 500;
  caret-color: var(--gold);
  resize: none;
}

.field textarea { line-height: 1.6; min-height: 72px; }

.field input::placeholder, .field textarea::placeholder {
  color: var(--border-bright);
}

/* トグル選択 */
.toggle-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.toggle-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.toggle-btn.active {
  background: var(--teal-dim);
  border-color: var(--teal);
  color: var(--teal);
}

/* 2列フィールド */
.field-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.field-row-2 .field {
  margin-bottom: 0;
}

/* レーティング入力 */
.rating-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.rating-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
}

.rating-input-wrap input {
  flex: 1;
  min-width: 0;
  font-size: 15px;
}

.rating-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}

.rating-badge.live {
  background: rgba(61,214,200,0.15);
  color: var(--teal);
  border: 1px solid rgba(61,214,200,0.3);
}

.rating-badge.phoenix {
  background: rgba(232,100,75,0.15);
  color: #e8704b;
  border: 1px solid rgba(232,100,75,0.3);
}

/* 写真＋名前・エリア 横並びラッパー */
.photo-name-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
  margin-bottom: 10px;
}

.photo-name-row .photo-upload {
  flex-shrink: 0;
  align-self: flex-start;
  aspect-ratio: 1 / 1;
  margin-bottom: 0;
}

.photo-name-row .fields-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.photo-name-row .fields-right .field {
  flex: 1;
  margin-bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* 写真 */
.photo-upload {
  background: var(--surface);
  border: 1px dashed var(--border-bright);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 10px;
  overflow: hidden;
  position: relative;
}

.photo-upload:active {
  border-color: var(--gold);
  background: var(--gold-dim);
}

.photo-upload img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
}

.photo-upload .upload-hint {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  z-index: 1;
}

.photo-upload .upload-icon {
  font-size: 28px;
  opacity: 0.5;
}

.photo-upload .upload-text {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.1em;
  font-family: var(--font-mono);
}

.photo-upload.has-photo .upload-hint { display: none; }

/* 生成ボタン */
.gen-btn {
  width: 100%;
  padding: 16px;
  background: var(--gold);
  border: none;
  border-radius: var(--radius);
  color: #0a0b0e;
  font-family: var(--font-display);
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 0.1em;
  margin-top: 24px;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.gen-btn:active { opacity: 0.85; transform: scale(0.98); }

/* ===== PREVIEW SCREEN ===== */
#preview-screen {
  padding: 16px 20px 40px;
}

/* ===== カードデザイン ===== */
#card-output {
  width: 100%;
  background: var(--surface);
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--border-bright);
  position: relative;
}

/* カード上部ヘッダー */
.card-header {
  background: linear-gradient(135deg, #0e1018 0%, #16192400 100%);
  border-bottom: 1px solid var(--border);
  padding: 18px 18px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
}

.card-header::before {
  content: '🎯';
  position: absolute;
  right: -10px;
  top: -10px;
  font-size: 80px;
  opacity: 0.06;
  pointer-events: none;
}

.card-photo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--gold);
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}

.card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-name-block { flex: 1; min-width: 0; }

.card-name {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--gold);
  line-height: 1.1;
  word-break: break-all;
}

.card-rating-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--gold-dim);
  border: 1px solid var(--gold-glow);
  border-radius: 20px;
  padding: 3px 10px;
  margin-top: 5px;
}

.card-rating-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.12em;
}

.card-rating-val {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--gold);
}

/* カードボディ */
.card-body {
  padding: 14px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* 2列グリッド */
.card-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.card-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.card-cell .c-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.card-cell .c-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--teal);
  word-break: break-all;
  line-height: 1.3;
}

.card-cell .c-val.gold { color: var(--gold); }

/* チョイス表示 */
.choice-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
}

.choice-item {
  color: var(--muted);
  transition: color 0.2s;
}

.choice-item.selected {
  color: var(--text);
  position: relative;
}

.choice-item.selected::after {
  content: '';
  position: absolute;
  inset: -3px -5px;
  border: 1.5px solid var(--teal);
  border-radius: 50%;
}

.choice-sep { color: var(--border-bright); font-size: 10px; }

/* PR セクション */
.card-pr {
  background: linear-gradient(135deg, var(--surface2), #1a1d2a);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 10px;
  padding: 12px 14px;
}

.card-pr .c-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.card-pr .c-val {
  font-size: 13px;
  font-weight: 500;
  color: var(--gold);
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-all;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* フッター */
.card-footer {
  border-top: 1px solid var(--border);
  padding: 8px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-footer-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--border-bright);
  letter-spacing: 0.12em;
}

/* 保存ボタン */
.save-btn {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  color: var(--gold);
  font-family: var(--font-display);
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 0.1em;
  margin-top: 16px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  -webkit-tap-highlight-color: transparent;
}

.save-btn:active {
  background: var(--gold-dim);
}

.save-btn.loading {
  opacity: 0.6;
  pointer-events: none;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--teal);
  color: #0a0b0e;
  font-weight: 700;
  font-size: 13px;
  padding: 12px 22px;
  border-radius: 30px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="app-header">
  <div class="dart-deco">🎯</div>
  <div class="logo">
    DARTS CARD GENERATOR
    <span>自己紹介カードメーカー</span>
  </div>
</div>

<!-- タブ -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('form')">✏️ 入力</button>
  <button class="tab-btn" onclick="switchTab('preview')">🃏 プレビュー</button>
</div>

<!-- ===== 入力画面 ===== -->
<div id="form-screen" class="screen active">

  <div class="section-label">基本情報</div>

  <!-- 写真＋名前・エリア -->
  <div class="photo-name-row">
    <div class="photo-upload" id="photo-upload" onclick="triggerPhoto()">
      <div class="upload-hint">
        <span class="upload-icon">📷</span>
        <span class="upload-text">写真を選択</span>
      </div>
    </div>
    <div class="fields-right">
      <div class="field">
        <label>カード名</label>
        <input type="text" id="f-name" placeholder="---" maxlength="20">
      </div>
      <div class="field">
        <label>エリア / ホーム</label>
        <input type="text" id="f-area" placeholder="---" maxlength="20">
      </div>
    </div>
  </div>
  <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="loadPhoto(event)">

  <div class="field">
    <label>レーティング</label>
    <div class="rating-row">
      <div class="rating-input-wrap">
        <span class="rating-badge live">LIVE</span>
        <input type="text" id="f-rating-live" placeholder="---" maxlength="6" inputmode="decimal" oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
      </div>
      <div class="rating-input-wrap">
        <span class="rating-badge phoenix">PHO</span>
        <input type="text" id="f-rating-phoenix" placeholder="---" maxlength="6" inputmode="decimal" oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
      </div>
    </div>
  </div>

  <div class="section-label">セッティング</div>

  <div class="field">
    <label>バレル</label>
    <input type="text" id="f-barrel" placeholder="---" maxlength="30">
  </div>

  <div class="field">
    <label>フライト / シャフト</label>
    <input type="text" id="f-flight" placeholder="---" maxlength="30">
  </div>

  <div class="field">
    <label>チップ</label>
    <input type="text" id="f-tip" placeholder="---" maxlength="20">
  </div>

  <div class="section-label">プレイスタイル</div>

  <div class="field">
    <label>普段のスタイル</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="style" data-val="solo" onclick="toggleSelect(this)">🤫 1人で黙々</button>
      <button class="toggle-btn" data-group="style" data-val="group" onclick="toggleSelect(this)">🎉 大人数でワイワイ</button>
    </div>
  </div>

  <div class="field">
    <label>飲酒</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="drink" data-val="yes" onclick="toggleSelect(this)">🍺 飲む</button>
      <button class="toggle-btn" data-group="drink" data-val="no" onclick="toggleSelect(this)">🚫 飲まない</button>
    </div>
  </div>

  <div class="field">
    <label>喫煙</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="smoke" data-val="yes" onclick="toggleSelect(this)">🚬 吸う</button>
      <button class="toggle-btn" data-group="smoke" data-val="no" onclick="toggleSelect(this)">🚭 吸わない</button>
    </div>
  </div>

  <div class="field">
    <label>ガチ度</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="gachi" data-val="gachi" onclick="toggleSelect(this)">🔥 ガチ</button>
      <button class="toggle-btn" data-group="gachi" data-val="half" onclick="toggleSelect(this)">⚖️ 半々</button>
      <button class="toggle-btn" data-group="gachi" data-val="enjoy" onclick="toggleSelect(this)">😄 エンジョイ</button>
    </div>
  </div>

  <div class="section-label">PR</div>

  <div class="field">
    <label>ひとことPR</label>
    <textarea id="f-pr" placeholder="---" maxlength="80"></textarea>
  </div>

  <button class="gen-btn" onclick="generateCard()">カードを生成する →</button>
</div>

<!-- ===== プレビュー画面 ===== -->
<div id="preview-screen" class="screen">

  <!-- 生成されるカード -->
  <div id="card-output">
    <!-- JS で描画 -->
  </div>

  <button class="save-btn" id="save-btn" onclick="saveCard()">
    <span>💾</span> PNG で保存する
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const state = {
  photo: null,    // base64 or null
  style: null,
  drink: null,
  smoke: null,
  gachi: null,
};

// ===== TAB =====
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='form') || (i===1 && tab==='preview'));
  });
  document.getElementById('form-screen').classList.toggle('active', tab==='form');
  document.getElementById('preview-screen').classList.toggle('active', tab==='preview');
}

// ===== PHOTO =====
function triggerPhoto() {
  document.getElementById('photo-input').click();
}

function loadPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.photo = ev.target.result;
    const el = document.getElementById('photo-upload');
    el.classList.add('has-photo');
    el.innerHTML = `<img src="${state.photo}" alt="photo">`;
    syncPhotoSize();
  };
  reader.readAsDataURL(file);
}

function syncPhotoSize() {
  const right = document.querySelector('.photo-name-row .fields-right');
  const photo = document.getElementById('photo-upload');
  if (!right || !photo) return;
  const h = right.getBoundingClientRect().height;
  if (h > 0) {
    photo.style.width  = h + 'px';
    photo.style.height = h + 'px';
  }
}

// ページ読み込み後・リサイズ時にも同期
window.addEventListener('load', syncPhotoSize);
window.addEventListener('resize', syncPhotoSize);

// ===== TOGGLE =====
function toggleSelect(btn) {
  const group = btn.dataset.group;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state[group] = btn.dataset.val;
}

// ===== GENERATE =====
function generateCard() {
  const name       = document.getElementById('f-name').value.trim() || 'NAME';
  const ratingLive = document.getElementById('f-rating-live').value.trim();
  const ratingPho  = document.getElementById('f-rating-phoenix').value.trim();
  const area       = document.getElementById('f-area').value.trim() || '—';
  const barrel     = document.getElementById('f-barrel').value.trim() || '—';
  const flight     = document.getElementById('f-flight').value.trim() || '—';
  const tip        = document.getElementById('f-tip').value.trim() || '—';
  const pr         = document.getElementById('f-pr').value.trim();

  const ratingBadges = (() => {
    const badges = [];
    if (ratingLive)  badges.push(`<span class="card-rating-badge" style="border-color:rgba(61,214,200,0.4);background:rgba(61,214,200,0.1)"><span class="card-rating-label" style="color:var(--teal)">LIVE</span><span class="card-rating-val" style="color:var(--teal)">${escHtml(ratingLive)}</span></span>`);
    if (ratingPho)   badges.push(`<span class="card-rating-badge" style="border-color:rgba(232,112,75,0.4);background:rgba(232,112,75,0.1)"><span class="card-rating-label" style="color:#e8704b">PHO</span><span class="card-rating-val" style="color:#e8704b">${escHtml(ratingPho)}</span></span>`);
    if (!badges.length) badges.push(`<span class="card-rating-badge"><span class="card-rating-label">RT</span><span class="card-rating-val">—</span></span>`);
    return badges.join('');
  })();

  const styleLabel = state.style === 'solo' ? ['1人で黙々','大人数でワイワイ'] : state.style === 'group' ? ['大人数でワイワイ','1人で黙々'] : [null, null];
  const drinkLabel = state.drink === 'yes' ? ['飲む','飲まない'] : state.drink === 'no' ? ['飲まない','飲む'] : [null, null];
  const smokeLabel = state.smoke === 'yes' ? ['吸う','吸わない'] : state.smoke === 'no' ? ['吸わない','吸う'] : [null, null];
  const gachiLabel = state.gachi === 'gachi' ? '🔥 ガチ' : state.gachi === 'half' ? '⚖️ 半々' : state.gachi === 'enjoy' ? '😄 エンジョイ' : null;

  function choiceHTML(selected, other) {
    if (!selected) return `<span class="choice-item" style="color:var(--border-bright)">未選択</span>`;
    return `
      <span class="choice-item selected">${selected}</span>
      <span class="choice-sep">・</span>
      <span class="choice-item">${other}</span>
    `;
  }

  const photoHTML = state.photo
    ? `<img src="${state.photo}" alt="photo">`
    : `<span style="font-size:28px">🎯</span>`;

  const prSection = pr ? `
    <div class="card-pr">
      <div class="c-label">PR</div>
      <div class="c-val">${escHtml(pr)}</div>
    </div>
  ` : '';

  // --- 入力済みセルだけ収集してグリッドに敷き詰める ---
  function cell(label, val, cls='') {
    return `<div class="card-cell">
      <div class="c-label">${label}</div>
      <div class="c-val${cls ? ' '+cls : ''}">${val}</div>
    </div>`;
  }
  function choiceCell(label, sel) {
    if (!sel) return null;
    return `<div class="card-cell">
      <div class="c-label">${label}</div>
      <div class="c-val">${sel}</div>
    </div>`;
  }

  // 全幅セル
  function wideCell(label, val, cls='') {
    return `<div class="card-cell">
      <div class="c-label">${label}</div>
      <div class="c-val${cls ? ' '+cls : ''}">${val}</div>
    </div>`;
  }

  // 1. エリア（全幅）
  const areaRow = area ? wideCell('エリア / ホーム', escHtml(area), 'gold') : '';

  // 2. セッティング（全幅）
  let settingRows = '';
  if (barrel) settingRows += wideCell('バレル', escHtml(barrel));
  if (flight) settingRows += wideCell('フライト / シャフト', escHtml(flight));
  if (tip)    settingRows += wideCell('チップ', escHtml(tip));

  // 3. 選択項目（2列グリッド）
  const choices = [];
  const styleCell = choiceCell('普段は', styleLabel[0]);
  if (styleCell) choices.push(styleCell);
  const drinkCell = choiceCell('飲酒', drinkLabel[0]);
  if (drinkCell) choices.push(drinkCell);
  const smokeCell = choiceCell('喫煙', smokeLabel[0]);
  if (smokeCell) choices.push(smokeCell);
  const gachiCell = choiceCell('ガチ度', gachiLabel);
  if (gachiCell) choices.push(gachiCell);

  let gridRows = '';
  for (let i = 0; i < choices.length; i += 2) {
    if (i + 1 < choices.length) {
      gridRows += `<div class="card-grid-2">${choices[i]}${choices[i+1]}</div>`;
    } else {
      gridRows += choices[i];
    }
  }

  document.getElementById('card-output').innerHTML = `
    <div class="card-header">
      <div class="card-photo">${photoHTML}</div>
      <div class="card-name-block">
        <div class="card-name">${escHtml(name)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
          ${ratingBadges}
        </div>
      </div>
    </div>
    <div class="card-body">
      ${areaRow}
      ${settingRows}
      ${gridRows}
      ${prSection}
    </div>
    <div class="card-footer">
      <span class="card-footer-tag">🎯 DARTS PROFILE CARD</span>
      <span class="card-footer-tag">${new Date().getFullYear()}</span>
    </div>
  `;

  switchTab('preview');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== SAVE =====
async function saveCard() {
  const btn = document.getElementById('save-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<span>⏳</span> 生成中…';

  try {
    const el = document.getElementById('card-output');
    const canvas = await html2canvas(el, {
      backgroundColor: '#12141a',
      scale: 3,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });

    const link = document.createElement('a');
    link.download = `darts-card-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    showToast('✅ 保存しました！');
  } catch(e) {
    showToast('❌ 保存に失敗しました');
    console.error(e);
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<span>💾</span> PNG で保存する';
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

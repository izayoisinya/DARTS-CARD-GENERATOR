<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="ダーツ自己紹介カードを作成してPNG保存・共有できるジェネレーターです。">
<meta name="theme-color" content="#040b09">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'">
<title>🎯 ダーツ自己紹介カード</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ヘッダー -->
<div class="app-header">
  <div class="dart-deco">🎯</div>
  <div class="logo">
    DARTS CARD GENERATOR
    <span>自己紹介カードメーカー</span>
  </div>
</div>

<!-- タブ -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="form">✏️ 入力</button>
  <button class="tab-btn" data-tab="preview">🃏 プレビュー</button>
</div>

<!-- ===== 入力画面 ===== -->
<div id="form-screen" class="screen active">

  <div class="section-label">基本情報</div>

  <!-- 写真＋名前・エリア -->
  <div class="photo-name-row">
    <div class="photo-upload" id="photo-upload">
      <div class="upload-hint">
        <span class="upload-icon">📷</span>
        <span class="upload-text">写真を選択</span>
      </div>
    </div>
    <div class="fields-right">
      <div class="field">
        <label>カード名</label>
        <input type="text" id="f-name" placeholder="---" maxlength="14">
      </div>
      <div class="field">
        <label>性別</label>
        <div class="toggle-row">
          <button class="toggle-btn" data-group="gender" data-val="male">♂ 男性</button>
          <button class="toggle-btn" data-group="gender" data-val="female">♀ 女性</button>
        </div>
      </div>
    </div>
  </div>
  <input type="file" id="photo-input" accept="image/*" style="display:none">

  <div class="photo-position-wrap">
    <label for="f-photo-scale">アイコン画像サイズ（トリミング）</label>
    <input type="range" id="f-photo-scale" min="100" max="220" value="130" step="5">
    <label for="f-photo-pos-x">アイコン表示位置（左右）</label>
    <input type="range" id="f-photo-pos-x" min="0" max="100" value="50" step="1">
    <label for="f-photo-pos-y">アイコン表示位置（上下）</label>
    <input type="range" id="f-photo-pos-y" min="0" max="100" value="50" step="1">
  </div>

  <div class="field">
    <label>エリア</label>
    <input type="text" id="f-area" placeholder="---" maxlength="16">
  </div>

  <div class="field">
    <label>ホーム</label>
    <input type="text" id="f-home" placeholder="---" maxlength="16">
  </div>

  <div class="field">
    <label>レーティング</label>
    <div class="rating-row">
      <div class="rating-input-wrap">
        <span class="rating-badge live">LIVE</span>
        <input type="text" id="f-rating-live" placeholder="00.00" maxlength="5" inputmode="decimal">
      </div>
      <div class="rating-input-wrap">
        <span class="rating-badge phoenix">PHO</span>
        <input type="text" id="f-rating-phoenix" placeholder="00.00" maxlength="5" inputmode="decimal">
      </div>
    </div>
  </div>

  <div class="field">
    <label>ダーツ歴</label>
    <input type="text" id="f-experience" placeholder="例: 3" maxlength="3" inputmode="numeric">
  </div>

  <div class="section-label">セッティング</div>

  <div class="field">
    <label>バレル</label>
    <input type="text" id="f-barrel" placeholder="---" maxlength="20">
  </div>

  <div class="field">
    <label>フライト</label>
    <input type="text" id="f-flight" placeholder="---" maxlength="20">
  </div>

  <div class="field">
    <label>シャフト</label>
    <input type="text" id="f-shaft" placeholder="---" maxlength="20">
  </div>

  <div class="field">
    <label>チップ</label>
    <input type="text" id="f-tip" placeholder="---" maxlength="16">
  </div>

  <div class="field my-darts-field">
    <label>マイダーツ画像</label>
    <div class="my-darts-upload" id="my-darts-upload">
      <div class="upload-hint">
        <span class="upload-icon">🎯</span>
        <span class="upload-text">画像を選択</span>
      </div>
    </div>
    <input type="file" id="my-darts-input" accept="image/*" style="display:none">
    <div class="my-darts-scale-wrap">
      <label for="f-my-darts-scale">画像サイズ（トリミング）</label>
      <input type="range" id="f-my-darts-scale" min="100" max="220" value="130" step="5">
    </div>
    <div class="my-darts-position-wrap">
      <label for="f-my-darts-pos-x">表示位置（左右）</label>
      <input type="range" id="f-my-darts-pos-x" min="0" max="100" value="50" step="1">
      <label for="f-my-darts-pos-y">表示位置（上下）</label>
      <input type="range" id="f-my-darts-pos-y" min="0" max="100" value="50" step="1">
    </div>
  </div>

  <div class="section-label">プレイスタイル</div>

  <div class="field">
    <label>普段のスタイル</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="style" data-val="solo">🤫 1人で黙々</button>
      <button class="toggle-btn" data-group="style" data-val="group">🎉 大人数でワイワイ</button>
    </div>
  </div>

  <div class="field">
    <label>飲酒</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="drink" data-val="yes">🍺 飲む</button>
      <button class="toggle-btn" data-group="drink" data-val="no">🚫 飲まない</button>
    </div>
  </div>

  <div class="field">
    <label>喫煙</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="smoke" data-val="yes">🚬 吸う</button>
      <button class="toggle-btn" data-group="smoke" data-val="no">🚭 吸わない</button>
    </div>
  </div>

  <div class="field">
    <label>ガチ度</label>
    <div class="toggle-row">
      <button class="toggle-btn" data-group="gachi" data-val="gachi">🔥 ガチ</button>
      <button class="toggle-btn" data-group="gachi" data-val="half">⚖️ 半々</button>
      <button class="toggle-btn" data-group="gachi" data-val="enjoy">😄 エンジョイ</button>
    </div>
  </div>

  <div class="section-label">その他項目</div>

  <div class="field">
    <label>好きなプロ/プレイヤー</label>
    <input type="text" id="f-favorite-pro" placeholder="---" maxlength="16">
  </div>

  <div class="field">
    <label>得意ナンバー</label>
    <input type="text" id="f-good-number" placeholder="---" maxlength="12">
  </div>

  <div class="field">
    <label>好きなゲーム</label>
    <input type="text" id="f-favorite-game" placeholder="---" maxlength="12">
  </div>

  <div class="section-label">SNS</div>

  <div class="field">
    <label>SNSアカウント</label>
    <div id="sns-list" class="sns-list">
      <div class="sns-row" data-fixed="true" data-sns-id="sns-x">
        <span class="sns-name-fixed">X</span>
        <input type="text" class="sns-account" data-sns-name="X" placeholder="@username / https://example.com" maxlength="24">
      </div>
      <div class="sns-row" data-fixed="true" data-sns-id="sns-instagram">
        <span class="sns-name-fixed">Instagram</span>
        <input type="text" class="sns-account" data-sns-name="Instagram" placeholder="@username / https://example.com" maxlength="24">
      </div>
      <div class="sns-row" data-fixed="true" data-sns-id="sns-tiktok">
        <span class="sns-name-fixed">TikTok</span>
        <input type="text" class="sns-account" data-sns-name="TikTok" placeholder="@username / https://example.com" maxlength="24">
      </div>
      <div class="sns-row" data-fixed="true" data-sns-id="sns-youtube">
        <span class="sns-name-fixed">YouTube</span>
        <input type="text" class="sns-account" data-sns-name="YouTube" placeholder="@username / https://example.com" maxlength="24">
      </div>
    </div>

    <div class="sns-qr-picker">
      <label for="f-qr-target">QR生成するSNS</label>
      <select id="f-qr-target" class="sns-qr-select">
        <option value="">選択しない</option>
      </select>
    </div>
  </div>

  <div class="section-label">PR</div>

  <div class="field">
    <label>ひとことPR</label>
    <textarea id="f-pr" placeholder="---" maxlength="200"></textarea>
  </div>

  <button class="gen-btn" id="generate-btn">カードを生成する →</button>
</div>

<!-- ===== プレビュー画面 ===== -->
<div id="preview-screen" class="screen">

  <!-- 生成されるカード -->
  <div id="card-preview-stage">
    <div id="card-preview-scale">
      <div id="card-output">
        <!-- JS で描画 -->
      </div>
    </div>
  </div>

  <div class="preview-actions">
    <button class="save-btn" id="save-btn">
      <span>💾</span> PNG で保存する
    </button>
    <button class="save-btn x-share-btn" id="x-share-btn">
      <span>𝕏</span> Xで投稿する
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>
<script src="validators.js"></script>
<script src="card-renderer.js"></script>
<script src="app.js"></script>
</body>
</html>
